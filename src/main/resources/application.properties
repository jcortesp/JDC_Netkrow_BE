# ================================
# Server
# ================================
server.port=8080

# ================================
# PostgreSQL
# Prioridad:
# 1) SPRING_DATASOURCE_*  (Render)
# 2) DATABASE_*           (fallback)
# 3) localhost            (desarrollo local)
# ================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/netkrow_local}
spring.datasource.username=${DATABASE_USERNAME:netkrow_db_user}
spring.datasource.password=${DATABASE_PASSWORD:AyN8Zs6yyUc5jme1PxOK6wcumku26lve}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.idle-timeout=600000

# ================================
# JPA / Hibernate
# En local: usa "update" por defecto.
# En Render: sobreescribe con SPRING_JPA_HIBERNATE_DDL_AUTO=none
# ================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================================
# Flyway
# Permite inicializar flyway_schema_history en esquemas existentes
# (producción ya tenía tablas antes de integrar Flyway)
# ================================
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}

# ================================
# Logging
# ================================
logging.level.org.springframework.security=WARN
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ================================
# CORS (leído por CorsConfig)
